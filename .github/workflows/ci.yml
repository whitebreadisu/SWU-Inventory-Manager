name: CI

# Build-once / promote model (BL-43 Phase 6, ADR-0007):
#
# On every push/PR:
#   backend  — pytest + ruff
#   frontend — vitest + eslint/prettier/tsc
#   terraform-fmt — fmt -check across all TF (no GCP auth needed)
#
# On push to main only:
#   build-and-push   — build image once; push to both dev and prod AR
#   deploy-dev       — terraform validate + apply dev; build + deploy frontend to swu-dev-jbapps
#   promote-prod     — environment: production (required reviewer); terraform validate +
#                      apply prod; build + deploy frontend to swu-prod
#
# Prod is never touched without a human approval in the GitHub "production"
# Environment. Dev is auto-deployed on every merge to main.

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: swu_inventory
          POSTGRES_USER: swu_user
          POSTGRES_PASSWORD: swu_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U swu_user -d swu_inventory"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://swu_user:swu_pass@localhost:5432/swu_inventory
      APP_DATABASE_URL: postgresql://swu_app:swu_app_pass@localhost:5432/swu_inventory
      APP_DB_PASSWORD: swu_app_pass
      CATALOG_SEED_PATH: ${{ github.workspace }}/db/seeds/catalog_seed.sql
      INVENTORY_SNAPSHOT_PATH: ${{ github.workspace }}/db/snapshots/inventory_snapshot.sql

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Lint (ruff check)
        working-directory: backend
        run: ruff check app

      - name: Format check (ruff format)
        working-directory: backend
        run: ruff format --check app

      - name: Apply migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Apply inventory snapshot
        working-directory: backend
        run: python -m app.ingestion.apply_inventory_snapshot

      - name: Run pytest
        working-directory: backend
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=75

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (eslint)
        working-directory: frontend
        run: npm run lint

      - name: Format check (prettier)
        working-directory: frontend
        run: npm run format:check

      - name: Type-check and build
        working-directory: frontend
        run: npm run build

      - name: Run vitest
        working-directory: frontend
        run: npx vitest run --coverage

  terraform-fmt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v4

      - name: Terraform format check
        run: terraform fmt -check -recursive terraform/

  # ── main-only: build image once, push to both dev and prod AR ──────────────

  build-and-push:
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    env:
      PROD_IMAGE: us-central1-docker.pkg.dev/swu-prod/backend/api
      DEV_IMAGE: us-central1-docker.pkg.dev/swu-dev-jbapps/backend/api

    steps:
      - uses: actions/checkout@v7

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: swu-prod
          workload_identity_provider: projects/373324715123/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: terraform-ci@swu-prod.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build image
        working-directory: backend
        run: docker build -t ${{ env.PROD_IMAGE }}:${{ github.sha }} .

      - name: Push to prod AR
        run: docker push ${{ env.PROD_IMAGE }}:${{ github.sha }}

      - name: Re-tag and push to dev AR
        run: |
          docker tag ${{ env.PROD_IMAGE }}:${{ github.sha }} ${{ env.DEV_IMAGE }}:${{ github.sha }}
          docker push ${{ env.DEV_IMAGE }}:${{ github.sha }}

  # ── risk classification (runs in parallel with deploy-dev) ────────────────
  # Reads the merged PR's labels to decide which promote path to take:
  #   risk:low  → promote-prod-fast (no human gate)
  #   default   → promote-prod (environment: production, required reviewer)
  # Stage 3 of the agentic platform roadmap (SWU_Platform_Roadmap.md §7.4).

  check-risk-level:
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    outputs:
      is_low_risk: ${{ steps.check.outputs.is_low_risk }}

    steps:
      - name: Check merged PR risk label
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          labels=$(gh api \
            "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --header "Accept: application/vnd.github.groot-preview+json" \
            --jq '.[0].labels[].name' 2>/dev/null || echo "")
          if echo "$labels" | grep -qx "risk:low"; then
            echo "is_low_risk=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_low_risk=false" >> "$GITHUB_OUTPUT"
          fi

  # ── auto-deploy to dev ─────────────────────────────────────────────────────

  deploy-dev:
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: swu-dev-jbapps
          workload_identity_provider: projects/887823370605/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: terraform-ci@swu-dev-jbapps.iam.gserviceaccount.com

      - uses: hashicorp/setup-terraform@v4

      - name: Terraform init (dev)
        working-directory: terraform/environments/dev
        run: terraform init

      - name: Terraform validate (dev)
        working-directory: terraform/environments/dev
        run: terraform validate

      - name: Terraform apply (dev)
        working-directory: terraform/environments/dev
        run: terraform apply -auto-approve -var="backend_image_tag=${{ github.sha }}"

      - name: Read dev Firebase config
        id: firebase_config
        working-directory: terraform/environments/dev
        run: |
          echo "api_key=$(terraform output -raw firebase_web_app_api_key)" >> "$GITHUB_OUTPUT"
          echo "auth_domain=$(terraform output -raw firebase_web_app_auth_domain)" >> "$GITHUB_OUTPUT"
          echo "project_id=$(terraform output -raw project_id)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (dev)
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ steps.firebase_config.outputs.api_key }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ steps.firebase_config.outputs.auth_domain }}
          VITE_FIREBASE_PROJECT_ID: ${{ steps.firebase_config.outputs.project_id }}
        run: npm run build

      - name: Deploy frontend to dev Firebase Hosting
        working-directory: frontend
        run: npx firebase-tools@latest deploy --only hosting --project swu-dev-jbapps --non-interactive

  # ── prod promote: gated path (default) ────────────────────────────────────

  promote-prod:
    needs: [deploy-dev, check-risk-level]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.check-risk-level.outputs.is_low_risk != 'true'
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: swu-prod
          workload_identity_provider: projects/373324715123/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: terraform-ci@swu-prod.iam.gserviceaccount.com

      - uses: hashicorp/setup-terraform@v4

      - name: Terraform init (prod)
        working-directory: terraform/environments/prod
        run: terraform init

      - name: Terraform validate (prod)
        working-directory: terraform/environments/prod
        run: terraform validate

      - name: Terraform apply (prod)
        working-directory: terraform/environments/prod
        run: terraform apply -auto-approve -var="backend_image_tag=${{ github.sha }}"

      - name: Read prod Firebase config
        id: firebase_config
        working-directory: terraform/environments/prod
        run: |
          echo "api_key=$(terraform output -raw firebase_web_app_api_key)" >> "$GITHUB_OUTPUT"
          echo "auth_domain=$(terraform output -raw firebase_web_app_auth_domain)" >> "$GITHUB_OUTPUT"
          echo "project_id=$(terraform output -raw project_id)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (prod)
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ steps.firebase_config.outputs.api_key }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ steps.firebase_config.outputs.auth_domain }}
          VITE_FIREBASE_PROJECT_ID: ${{ steps.firebase_config.outputs.project_id }}
        run: npm run build

      - name: Deploy frontend to prod Firebase Hosting
        working-directory: frontend
        run: npx firebase-tools@latest deploy --only hosting --project swu-prod --non-interactive

  # ── prod promote: fast path (risk:low label — no human gate) ───────────────

  promote-prod-fast:
    needs: [deploy-dev, check-risk-level]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.check-risk-level.outputs.is_low_risk == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: swu-prod
          workload_identity_provider: projects/373324715123/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: terraform-ci@swu-prod.iam.gserviceaccount.com

      - uses: hashicorp/setup-terraform@v4

      - name: Terraform init (prod)
        working-directory: terraform/environments/prod
        run: terraform init

      - name: Terraform validate (prod)
        working-directory: terraform/environments/prod
        run: terraform validate

      - name: Terraform apply (prod)
        working-directory: terraform/environments/prod
        run: terraform apply -auto-approve -var="backend_image_tag=${{ github.sha }}"

      - name: Read prod Firebase config
        id: firebase_config
        working-directory: terraform/environments/prod
        run: |
          echo "api_key=$(terraform output -raw firebase_web_app_api_key)" >> "$GITHUB_OUTPUT"
          echo "auth_domain=$(terraform output -raw firebase_web_app_auth_domain)" >> "$GITHUB_OUTPUT"
          echo "project_id=$(terraform output -raw project_id)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (prod)
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ steps.firebase_config.outputs.api_key }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ steps.firebase_config.outputs.auth_domain }}
          VITE_FIREBASE_PROJECT_ID: ${{ steps.firebase_config.outputs.project_id }}
        run: npm run build

      - name: Deploy frontend to prod Firebase Hosting
        working-directory: frontend
        run: npx firebase-tools@latest deploy --only hosting --project swu-prod --non-interactive
