name: CI

# P3 stage 1: run the existing pytest/Vitest suites on every push and pull
# request. Pure CI — no GCP/Terraform involved yet (that's stages 2-3).
#
# P3 stage 2: on a push to main, once both test jobs pass, build the backend
# image and push it to Artifact Registry tagged with the commit SHA.
#
# P3 stage 3: once the image is pushed, run `terraform apply` against
# terraform/environments/prod, pointing Cloud Run at that SHA-tagged image.
#
# P3 stage 4: also rebuild the frontend and deploy frontend/dist to Firebase
# Hosting, so a merge to main updates both backend and frontend.
on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: swu_inventory
          POSTGRES_USER: swu_user
          POSTGRES_PASSWORD: swu_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U swu_user -d swu_inventory"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://swu_user:swu_pass@localhost:5432/swu_inventory
      APP_DATABASE_URL: postgresql://swu_app:swu_app_pass@localhost:5432/swu_inventory
      APP_DB_PASSWORD: swu_app_pass
      CATALOG_SEED_PATH: ${{ github.workspace }}/db/seeds/catalog_seed.sql
      INVENTORY_SNAPSHOT_PATH: ${{ github.workspace }}/db/snapshots/inventory_snapshot.sql

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Apply migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Apply catalog seed
        working-directory: backend
        run: python -m app.ingestion.apply_seed

      - name: Apply inventory snapshot
        working-directory: backend
        run: python -m app.ingestion.apply_inventory_snapshot

      - name: Run pytest
        working-directory: backend
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=75

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check and build
        working-directory: frontend
        run: npm run build

      - name: Run vitest
        working-directory: frontend
        run: npx vitest run --coverage

  build-and-push:
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    env:
      IMAGE: us-central1-docker.pkg.dev/swu-prod/backend/api

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: swu-prod
          workload_identity_provider: projects/373324715123/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: terraform-ci@swu-prod.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build image
        working-directory: backend
        run: docker build -t ${{ env.IMAGE }}:${{ github.sha }} .

      - name: Push image
        run: docker push ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: swu-prod
          workload_identity_provider: projects/373324715123/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: terraform-ci@swu-prod.iam.gserviceaccount.com

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: terraform/environments/prod
        run: terraform init

      - name: Terraform apply
        working-directory: terraform/environments/prod
        run: terraform apply -auto-approve -var="backend_image_tag=${{ github.sha }}"

  frontend-deploy:
    needs: [backend, frontend, deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: swu-prod
          workload_identity_provider: projects/373324715123/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: terraform-ci@swu-prod.iam.gserviceaccount.com

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: terraform/environments/prod
        run: terraform init

      # P5 stage 4 prerequisite: by this point `deploy` has already applied
      # firebase.tf's google_firebase_web_app, so its real SDK config is in
      # state -- read it here and inject it into the frontend build below.
      - name: Read Firebase web app config
        id: firebase_config
        working-directory: terraform/environments/prod
        run: |
          echo "api_key=$(terraform output -raw firebase_web_app_api_key)" >> "$GITHUB_OUTPUT"
          echo "auth_domain=$(terraform output -raw firebase_web_app_auth_domain)" >> "$GITHUB_OUTPUT"
          echo "project_id=$(terraform output -raw project_id)" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ steps.firebase_config.outputs.api_key }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ steps.firebase_config.outputs.auth_domain }}
          VITE_FIREBASE_PROJECT_ID: ${{ steps.firebase_config.outputs.project_id }}
        run: npm run build

      - name: Deploy to Firebase Hosting
        working-directory: frontend
        run: npx firebase-tools@latest deploy --only hosting --project swu-prod --non-interactive
