name: CI

# P3 stage 1: run the existing pytest/Vitest suites on every push and pull
# request. Pure CI — no GCP/Terraform involved yet (that's stages 2-3).
on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: swu_inventory
          POSTGRES_USER: swu_user
          POSTGRES_PASSWORD: swu_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U swu_user -d swu_inventory"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://swu_user:swu_pass@localhost:5432/swu_inventory
      CATALOG_SEED_PATH: ${{ github.workspace }}/db/seeds/catalog_seed.sql
      INVENTORY_SNAPSHOT_PATH: ${{ github.workspace }}/db/snapshots/inventory_snapshot.sql

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Apply migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Apply catalog seed
        working-directory: backend
        run: python -m app.ingestion.apply_seed

      - name: Apply inventory snapshot
        working-directory: backend
        run: python -m app.ingestion.apply_inventory_snapshot

      - name: Run pytest
        working-directory: backend
        run: pytest

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check and build
        working-directory: frontend
        run: npm run build

      - name: Run vitest
        working-directory: frontend
        run: npx vitest run
