# Inventory column mapping configuration for Excel import (F4).
#
# This is a first-class project artifact — the authoritative record of
# which inventory columns appear in each set's Excel tab, and how those
# column headers map to variant flags in the database.
#
# Column detection in excel_ingestor.py is fully dynamic (reads the header
# row at parse time using VARIANT_COLUMN_FLAGS), so this file is documentation
# rather than runtime configuration. It informs the future "add new set"
# enhancement: a new set requires a new Excel tab and, if it introduces a new
# variant type, a new entry in the variant_columns section and in the code dict.
#
# ── Variant Column → Flag Mapping ────────────────────────────────────────
#
# Column header    is_foil  is_hyperspace  is_prestige  is_showcase  is_organized_play
# ─────────────────────────────────────────────────────────────────────────
# Non-Foil         false    false          false         false        false
# Standard *       false    false          false         false        false
# Foil             true     false          false         false        false
# Hyperspace       false    true           false         false        false
# F-Hyperspace     true     true           false         false        false
# Prestige         false    false          true          false        false
# Prestige Foil    true     false          true          false        false
# Promo            false    false          false         false        true
# Promo Foil       true     false          false         false        true
#
# * "Standard" is the LAW-specific alias for "Non-Foil" — both map to all-false flags.
#   All matching is case-insensitive ("PRESTIGE" in JTL matches "prestige").
#
# ── SOR/SHD/TWI Lookup Limitation ───────────────────────────────────────
#
# For SOR, SHD, and TWI (has_unique_variant_numbers=false), the F3 CSV ingestion
# stores each variant's base_card_number equal to its own card_number. This means
# Hyperspace and OP variants (which have distinct card numbers, e.g., 281+) cannot
# be resolved by the Excel row's base card number (e.g., "1"). Standard and Foil
# import correctly; Hyperspace, F-Hyperspace, Promo, and Promo Foil for these three
# sets produce logged lookup failures. No data is lost — quantities remain zero.
# This is a known limitation of the F3 base_card_number assignment strategy for
# non-unique-variant-number sets and is a candidate for a future correction.

sets:

  SOR:
    tab_name: SOR
    has_unique_variant_numbers: false
    inventory_columns: [Non-Foil, Foil, Hyperspace, F-Hyperspace]
    # Hyperspace and F-Hyperspace lookups will produce logged failures (see note above).

  SHD:
    tab_name: SHD
    has_unique_variant_numbers: false
    inventory_columns: [Non-Foil, Foil, Hyperspace, F-Hyperspace, Promo, Promo Foil]
    # Hyperspace, F-Hyperspace, Promo, and Promo Foil lookups will fail (see note above).

  TWI:
    tab_name: TWI
    has_unique_variant_numbers: false
    inventory_columns: [Non-Foil, Foil, Hyperspace, F-Hyperspace]
    # Hyperspace and F-Hyperspace lookups will produce logged failures (see note above).

  JTL:
    tab_name: JTL
    has_unique_variant_numbers: true
    inventory_columns: [Non-Foil, Foil, Hyperspace, F-Hyperspace, PRESTIGE]
    # PRESTIGE is all-uppercase in the source file; handled by case-insensitive matching.

  LOF:
    tab_name: LOF
    has_unique_variant_numbers: true
    inventory_columns: [Non-Foil, Foil, Hyperspace, F-Hyperspace, Prestige, Promo, Promo Foil]

  SEC:
    tab_name: SEC
    has_unique_variant_numbers: true
    inventory_columns: [Non-Foil, Foil, Hyperspace, F-Hyperspace, Prestige, Prestige Foil, Promo, Promo Foil]
    # Card numbers are integers in Excel (1, 2, 3...); all other sets use strings ('001').
    # parse_card_number(str(n)) normalizes both to stripped strings matching the database.
    # Data rows begin at row 4 (index 3) — no formula row between header and data.

  LAW:
    tab_name: LAW
    has_unique_variant_numbers: true
    inventory_columns: [Standard, Hyperspace, F-Hyperspace, Prestige, Prestige Foil, Promo, Promo Foil]
    # Uses 'Standard' instead of 'Non-Foil'. No standalone 'Foil' column —
    # LAW does not have regular foil cards. 'Standard' maps to all-false flags,
    # identical to 'Non-Foil'.
