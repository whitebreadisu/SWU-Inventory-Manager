# Field mapping configuration for all 14 SWU CSV source files.
#
# This is a first-class project artifact — the authoritative record of
# normalization decisions made during F3. It serves as the specification
# for the future "add new set" enhancement: new set = new entries here
# plus new CSV files.
#
# Column ORDER varies across files. All ingestion uses header-based (by-name)
# parsing — column order differences have no effect.
#
# Variant flag logic (is_foil, is_hyperspace, is_prestige, is_showcase) is
# implemented in code and is consistent across all 14 files. It is not
# configured here.
#
# is_organized_play is per-file config (not a CSV field).
# set_id is resolved at runtime from set_code (not a CSV field).
#
# Canonical field → CSV column mappings:
#   name          → name
#   rarity        → extRarity       (Common/Uncommon/Rare/Legendary/Special → C/U/R/L/S)
#   card_number   → extNumber       (strip /total, remove leading zeros)
#   type          → extCardType     (Unit/Event/Upgrade/Leader/Base — stored as-is)
#   sub_type_name → subTypeName     (Normal/Foil — used as fallback for variant flags)
#   group_id      → groupId         (used to validate set membership; not stored)
#
# Fields NOT ingested in V1 (Phase 2 or excluded):
#   extDescription, extCost, extPower, extHP, extArenaType, extEpicAction → Phase 2 card_details
#   extAspect  → Phase 2 card_aspects
#   extTraits  → Phase 2 card_traits
#   All price fields, imageUrl, productId, cleanName, modifiedOn, categoryId, url, imageCount

files:

  # ---------------------------------------------------------------------------
  # Spark of Rebellion (SOR) | has_unique_variant_numbers: false
  # SOR/SHD/TWI: Normal and Foil variants share the same card number.
  # Variant identified by subTypeName field (Normal vs Foil).
  # ---------------------------------------------------------------------------
  - set_code: SOR
    csv_filename: SparkofRebellionProductsAndPrices.csv
    is_organized_play: false
    has_unique_variant_numbers: false
    # Note: price columns appear before extRarity — unusual column order.
    field_map:
      name: name
      rarity: extRarity
      card_number: extNumber
      type: extCardType
      sub_type_name: subTypeName
      group_id: groupId

